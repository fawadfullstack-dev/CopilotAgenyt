<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Copilot Agent</title>

  <!-- Microsoft Teams JS SDK -->
  <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brand: #0f6cbd;
      --brand-light: #cfe4f9;
      --bg: #f3f6fb;
      --surface: #ffffff;
      --text: #1b1f26;
      --muted: #6b7280;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(15, 108, 189, 0.10);
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 28px;
      background: var(--surface);
      border-bottom: 1px solid #e3eaf4;
      box-shadow: 0 2px 10px rgba(15,108,189,0.06);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-wrap {
      width: 38px;
      height: 38px;
      background: var(--brand);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-wrap svg {
      width: 22px;
      height: 22px;
      fill: #fff;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #eaf6ee;
      color: #1a7f37;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #2da44e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 28px;
      gap: 20px;
    }

    /* ── Chat card ── */
    .chat-card {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid #e3eaf4;
      min-height: 520px;
    }

    .chat-card-header {
      padding: 14px 20px;
      background: linear-gradient(90deg, #0f6cbd 0%, #1e8de1 100%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-card-header span {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .chat-card-header svg {
      width: 18px;
      height: 18px;
      fill: rgba(255,255,255,0.85);
      flex-shrink: 0;
    }

    .chat-card iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
      min-height: 480px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 12px 28px 18px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
    }

    footer a {
      color: var(--brand);
      text-decoration: none;
    }

    /* ── Teams dark theme support ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1b1f26;
        --surface: #242830;
        --text: #f0f2f5;
        --muted: #9ca3af;
      }
      header { border-bottom-color: #2e3340; }
      .chat-card { border-color: #2e3340; }
      .status-pill { background: #1a2e1d; color: #4ade80; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <!-- Copilot-style icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 3a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm3 12H9v-1.5h2.25V11H9.75V9.5h3v6H15V17z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Copilot Agent</h1>
      <p>Powered by Microsoft Copilot Studio</p>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
  </header>

  <!-- Main content -->
  <main>
    <div class="chat-card">
      <div class="chat-card-header">
        <!-- Chat bubble icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2z"/>
        </svg>
        <span>Chat with your Copilot Agent</span>
      </div>

      <!-- ✅ Your Copilot Agent iframe -->
      <iframe
        src="https://copilotstudio.preview.microsoft.com/environments/3c5533b2-5f1d-e8af-9fc0-a8b55cdbb45d/bots/cr21b_callCenterAgent2/webchat?__version__=2"
        frameborder="0"
        allow="microphone"
        title="Copilot Agent Chat"
      ></iframe>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    Built with <a href="https://copilotstudio.microsoft.com" target="_blank">Microsoft Copilot Studio</a>
  </footer>

  <!-- Teams SDK Init -->
  <script>
    microsoftTeams.app.initialize().then(() => {
      // Apply Teams theme if available
      microsoftTeams.app.getContext().then((context) => {
        const theme = context.app?.theme || 'default';
        if (theme === 'dark') {
          document.documentElement.style.setProperty('--bg', '#1b1f26');
          document.documentElement.style.setProperty('--surface', '#242830');
          document.documentElement.style.setProperty('--text', '#f0f2f5');
        }
      });
    }).catch(() => {
      // Running outside Teams — works fine in browser too
      console.log('Running in standalone browser mode.');
    });
  </script>

</body>
</html>
